spring.application.name=Hyfata-RestAPI
server.port=${PORT:8080}

# Forward Headers (for reverse proxy support - Nginx, ALB, etc.)
server.forward-headers-strategy=native

# Database Configuration (JPA)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# R2DBC Configuration (Optional)
spring.r2dbc.url=${R2DBC_URL}
spring.r2dbc.username=${DB_USER}
spring.r2dbc.password=${DB_PASSWORD}

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000
jwt.refresh-expiration=1209600000

# Authentication Configuration
auth.2fa.expiration-minutes=10
auth.reset-token.expiration-hours=1

# Mail Configuration (IMAP/SMTP - mail.hyfata.kr)
spring.mail.enabled=true
spring.mail.host=${MAIL_HOST_NAME}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.from=${MAIL_FROM}

# IMAP Configuration (for receiving emails)
# mail.imap.host=mail.hyfata.kr
# mail.imap.port=993
# mail.imap.ssl.enable=true
# mail.imap.auth=true

# Async Configuration
spring.task.execution.pool.core-size=2
spring.task.execution.pool.max-size=5
spring.task.execution.pool.queue-capacity=100

# Backend URL (for password reset / account restore pages served by API)
app.backend.url=${API_URL:https://api.hyfata.kr}

# CORS allowed origins (comma-separated, e.g., http://localhost:3000,https://app.hyfata.com)
# Leave empty to disable CORS (for same-origin only)
app.cors.allowed-origins=${CORS_URLS:https://hyfata.kr}

# Logging
logging.level.kr.hyfata.rest.api=INFO
logging.level.org.springframework.security=DEBUG

# Scheduled Tasks
spring.task.scheduling.pool.size=2
spring.task.scheduling.thread-name-prefix=oauth-scheduler-

# Session Management Configuration
session.max-per-user=5

# Spring Session (Redis) - OAuth 서버사이드 세션
server.servlet.session.cookie.name=HYFATA_SESSION
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=Lax
server.servlet.session.timeout=24h

# Redis Configuration (Token Blacklist)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}

# GeoIP Configuration (optional)
geoip.database-path=${GEOIP_DATABASE_PATH:./GeoLite2-City.mmdb}
geoip.enabled=${GEOIP_ENABLED:false}

# Sensitive Endpoints (require blacklist check)
security.sensitive-endpoints=/api/auth/change-password,/api/auth/enable-2fa,/api/auth/disable-2fa,/api/account,/api/users/me,/api/payments,/api/sessions

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# First-Party OAuth Clients (Official clients managed via configuration)
app.first-party.clients[0].client-id=${OFFICIAL_WEB_CLIENT_ID:hyfata-official-web}
app.first-party.clients[0].client-secret=${OFFICIAL_WEB_CLIENT_SECRET}
app.first-party.clients[0].name=${OFFICIAL_WEB_CLIENT_NAME:Hyfata Official Web}
app.first-party.clients[0].description=${OFFICIAL_WEB_CLIENT_DESCRIPTION:Hyfata official web client}
app.first-party.clients[0].frontend-url=${OFFICIAL_WEB_FRONTEND_URL:https://hyfata.kr}
app.first-party.clients[0].redirect-uris=${OFFICIAL_WEB_REDIRECT_URIS:https://hyfata.kr/oauth/callback}
app.first-party.clients[0].default-scopes=${OFFICIAL_WEB_DEFAULT_SCOPES:profile email profile:write account:password account:manage 2fa:manage sessions:manage}
app.first-party.clients[0].allowed-scopes=${OFFICIAL_WEB_ALLOWED_SCOPES:profile email profile:write account:password account:manage 2fa:manage sessions:manage}
app.first-party.clients[0].max-tokens-per-user=${OFFICIAL_WEB_MAX_TOKENS_PER_USER:5}
app.first-party.clients[0].enabled=${OFFICIAL_WEB_ENABLED:true}
